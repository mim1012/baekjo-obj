name: update-baselines (시각 회귀 베이스라인 갱신)

# 의도된 디자인/콘텐츠 변경 시 베이스라인 스냅샷을 CI(Linux)에서 재생성해 브랜치에 커밋한다.
# ⚠️ 베이스라인은 반드시 여기(Linux 러너)서 생성 — 로컬 Windows 스냅샷은 폰트 렌더 차이로 전부 오탐.
# 트리거 2가지:
#   1) PR에 `update-baselines` 라벨 부착 → PR 브랜치의 Preview 배포 URL을 자동 해석해 갱신·커밋
#   2) 수동 dispatch(브랜치 선택 + base_url 입력)
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Vercel Preview URL (https://...)'
        required: true
  pull_request:
    types: [labeled]

# 라벨 재부착·수동 dispatch 동시 실행 시 baseline push 충돌(non-fast-forward) 방지 — 브랜치당 직렬화
concurrency:
  group: update-baselines-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    # fork PR의 GITHUB_TOKEN은 read-only라 push 불가 — 같은 리포 브랜치에서만 실행.
    # checkout credential은 BOT_PAT를 써서 베이스라인 커밋 push가 후속 required CI를 트리거하게 한다.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'update-baselines' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          token: ${{ secrets.BOT_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Resolve preview URL
        id: preview
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "url=$INPUT_BASE_URL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.pull_request.head.sha }}"
          # environment=Preview 필터 필수 — sha에 다른 환경 배포가 섞이면 잘못된 URL을 집는다.
          # GitHub API는 최신순 정렬이므로 [0] = 최신 Preview 배포.
          DEP=$(gh api "repos/${{ github.repository }}/deployments?sha=$SHA&environment=Preview&per_page=10" --jq '.[0].id')
          if [ -z "$DEP" ] || [ "$DEP" = "null" ]; then
            echo "::error::이 커밋($SHA)의 Vercel Preview 배포를 찾지 못했습니다. 배포 완료 후 라벨을 다시 붙이세요."
            exit 1
          fi
          # statuses도 최신순 — 첫 success = 최신 성공 상태
          URL=$(gh api "repos/${{ github.repository }}/deployments/$DEP/statuses" \
            --jq '[.[] | select(.state=="success")][0].environment_url')
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::Preview 배포($DEP)가 아직 success 상태가 아닙니다."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Regenerate baselines
        run: npx playwright test tests/golden/visual.spec.ts --update-snapshots=all --reporter=line
        env:
          E2E_BASE_URL: ${{ steps.preview.outputs.url }}
          # Deployment Protection 재활성화 대비(§8-6) — secret 미등록이면 빈 값으로 무시됨
          VERCEL_AUTOMATION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS }}
          # 공개 리포 — admin 자격증명은 secret으로만 주입(미등록 시 admin 촬영 skip)
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Commit & push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/golden/visual.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "베이스라인 변경 없음 — 커밋 생략"
          else
            git commit -m "test(visual): 베이스라인 갱신 (CI Linux, ${{ steps.preview.outputs.url }})"
            git push
          fi
