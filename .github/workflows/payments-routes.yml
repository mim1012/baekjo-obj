name: payments-routes (결제 라우트 프리뷰 통합)

# Vercel Preview 배포가 성공한 시점에 그 배포 URL을 대상으로 결제 라우트 통합 스펙(8개)을 돌린다.
# tests/payments/payment-routes.spec.ts는 PAYMENTS_PREVIEW_URL이 없으면 skip하도록 짜여 있어(로컬 실행
# 편의) — 이 워크플로가 그 값을 실제로 채워 넣는 배선이다. visual.yml과 동일한 트리거/조건을 그대로
# 재사용한다: Preview 환경에서만, 배포 성공 시에만 실행 — Production에서는 절대 돌지 않는다(합성
# __test_* 레코드를 prod에 만들면 사고).
on:
  deployment_status:

# visual.yml과 동일 그룹 키를 공유해 같은 프리뷰(=같은 staging DB)를 대상으로 하는 두 워크플로가
# 절대 동시에 돌지 않고 큐잉되어 순차 실행되게 한다. 이유: 결제 라우트 스펙(payment-routes.spec.ts)이
# staging DB에 합성 상품(주문 생성을 위해 is_visible=true 필수 — 비노출 상품 주문은 정책상 차단,
# src/app/api/orders/route.ts)을 만드는데, 이게 같은 DB를 스크린샷하는 visual과 겹치면 그 합성 상품이
# /shop 시각 회귀에 찍혀 오탐이 난다(실측: PR #32, /shop 데스크톱 4% diff).
# cancel-in-progress: false 필수 — 같은 그룹에서 true면 나중 워크플로가 상대를 취소해버려 required
# check(visual)가 영영 안 돌고 머지가 막힌다. 트레이드오프: 기존 cancel-in-progress: true가 노리던
# "동일 SHA 중복 deployment_status 이벤트 중복 실행 방지"는 약해진다(중복 이벤트가 취소 대신 큐잉돼
# 중복 실행된다). 대신 두 워크플로가 절대 겹치지 않는다 — 시각 회귀 오탐이 더 비싼 문제라 이 교환이 옳다.
concurrency:
  group: preview-db-${{ github.event.deployment.sha }}
  cancel-in-progress: false

jobs:
  payments-routes:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: 결제 라우트 통합 스펙 (프리뷰=staging DB)
        run: npx playwright test --project=payments tests/payments/payment-routes.spec.ts --reporter=line
        env:
          # Preview 배포는 staging DB를 본다(AGENTS.md §8-4 환경 매핑) — DB 검증도 staging 시크릿으로 일관.
          PAYMENTS_PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: payments-routes-failure
          path: test-results/
          retention-days: 7
