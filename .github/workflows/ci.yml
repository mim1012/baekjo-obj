name: CI (drift gate)

# 모든 PR과 main push에서 자동 실행됩니다.
# 어떤 IDE(Antigravity / Claude Code / Codex)로 짰든 GitHub에서 동일하게 걸립니다.
# typecheck / build / lint 중 하나라도 실패하면 머지가 막혀 drift가 프로덕션에 새지 않습니다.

on:
  pull_request:
    branches: [main, "integrate/**"]
  push:
    branches: [main, "integrate/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (계약 위반 = drift 탐지)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # 마이그레이션 자동 적용 — 빌드가 통과한 실제 push(머지)에서만 실행한다.
  # PR 에는 돌지 않아(머지 전 DB 를 건드리지 않음), 깨진 코드가 DB 스키마를 바꾸지 못한다.
  # 러너(scripts/apply-migrations.mjs)는 public._migrations 로 적용 이력을 추적해 미적용만 돌리고,
  # 끝에 주요 테이블 존재를 검증한다. 어떤 IDE로 짰든 GitHub 에서 동일하게 적용·검증된다.
  migrate:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 환경 체계(2026-07-12): main push → prod DB, 그 외(integrate/**) push → staging DB.
      # Vercel 도 동일 매핑: main=Production(prod DB) / Preview=staging DB.
      - name: Apply migrations (미적용만) + 검증
        run: node scripts/apply-migrations.mjs
        env:
          SUPABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL || secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # 결제 상태기계 DB 스펙(tests/payments/state-machine.db.spec.ts) — staging 전용, prod는 절대 사용하지 않는다.
  # 합성 __test_* 레코드로 0021/0024/0026 계약을 검증한다(브라우저 불필요, API 테스트). PR/push 모두 실행 —
  # staging에만 쓰기 때문에 머지 전에 돌려도 안전하고, 다음 리팩터(R2~R5)의 회귀 안전망이 된다.
  #
  # ★job-level concurrency — visual.yml/payments-routes.yml과 같은 preview-db-<sha> 그룹으로
  # 직렬화한다(2026-07-13 실측: PR에서 /admin/products 데스크톱 2% diff로 visual이 오탐 FAIL).
  # 이 잡이 만드는 합성 __test_* 상품/주문이 staging DB에 남아있는 채로 visual이 같은 DB를
  # 대상으로 /admin/products를 스크린샷하면(관리자 목록은 is_visible=false도 노출) 그 합성
  # 레코드가 찍힌다. visual/payments-routes 둘은 deployment_status 트리거라 그룹 키가
  # github.event.deployment.sha인데, 이 워크플로는 pull_request/push 트리거라 같은 커밋의
  # SHA를 pull_request.head.sha(PR) 또는 github.sha(push)로 얻는다 — PR의 Vercel 배포 sha는
  # 항상 PR head sha와 같으므로 세 워크플로가 동일한 그룹 키에 도달해 실제로 직렬화된다.
  # cancel-in-progress: false 필수 — true면 나중 워크플로가 상대를 취소해 required check가
  # 영영 안 돌 수 있다(visual.yml의 동일 트레이드오프 설명 참고).
  payments-db-spec:
    runs-on: ubuntu-latest
    needs: verify
    concurrency:
      group: preview-db-${{ github.event.pull_request.head.sha || github.sha }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: 결제 상태기계 DB 스펙 (staging)
        run: npx playwright test --project=payments tests/payments/state-machine.db.spec.ts --reporter=line
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
