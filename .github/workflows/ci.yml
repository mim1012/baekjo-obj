name: CI (drift gate)

# 모든 PR과 main push에서 자동 실행됩니다.
# 어떤 IDE(Antigravity / Claude Code / Codex)로 짰든 GitHub에서 동일하게 걸립니다.
# typecheck / build / lint 중 하나라도 실패하면 머지가 막혀 drift가 프로덕션에 새지 않습니다.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (계약 위반 = drift 탐지)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
