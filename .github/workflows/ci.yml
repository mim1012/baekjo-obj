name: CI (drift gate)

# 모든 PR과 main push에서 자동 실행됩니다.
# 어떤 IDE(Antigravity / Claude Code / Codex)로 짰든 GitHub에서 동일하게 걸립니다.
# typecheck / build / lint 중 하나라도 실패하면 머지가 막혀 drift가 프로덕션에 새지 않습니다.

on:
  pull_request:
    branches: [main, "integrate/**"]
  push:
    branches: [main, "integrate/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck (계약 위반 = drift 탐지)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # 마이그레이션 자동 적용 — 빌드가 통과한 실제 push(머지)에서만 실행한다.
  # PR 에는 돌지 않아(머지 전 DB 를 건드리지 않음), 깨진 코드가 DB 스키마를 바꾸지 못한다.
  # 러너(scripts/apply-migrations.mjs)는 public._migrations 로 적용 이력을 추적해 미적용만 돌리고,
  # 끝에 주요 테이블 존재를 검증한다. 어떤 IDE로 짰든 GitHub 에서 동일하게 적용·검증된다.
  migrate:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 환경 체계(2026-07-12): main push → prod DB, 그 외(integrate/**) push → staging DB.
      # Vercel 도 동일 매핑: main=Production(prod DB) / Preview=staging DB.
      - name: Apply migrations (미적용만) + 검증
        run: node scripts/apply-migrations.mjs
        env:
          SUPABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL || secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # 결제 상태기계 DB 스펙(tests/payments/state-machine.db.spec.ts) — staging 전용, prod는 절대 사용하지 않는다.
  # 합성 __test_* 레코드로 0021/0024/0026 계약을 검증한다(브라우저 불필요, API 테스트). PR/push 모두 실행 —
  # staging에만 쓰기 때문에 머지 전에 돌려도 안전하고, 다음 리팩터(R2~R5)의 회귀 안전망이 된다.
  payments-db-spec:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: 결제 상태기계 DB 스펙 (staging)
        run: npx playwright test --project=payments tests/payments/state-machine.db.spec.ts --reporter=line
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
