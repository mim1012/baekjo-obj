name: CI (drift gate)

# 모든 PR과 main push에서 자동 실행됩니다.
# 어떤 IDE(Antigravity / Claude Code / Codex)로 짰든 GitHub에서 동일하게 걸립니다.
# typecheck / build / lint 중 하나라도 실패하면 머지가 막혀 drift가 프로덕션에 새지 않습니다.

on:
  pull_request:
    branches: [main, "integrate/**"]
  push:
    branches: [main, "integrate/**"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit gate
        run: node scripts/verify-dependency-audit.mjs

      - name: Typecheck (계약 위반 = drift 탐지)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: 상품 입력 검증 단위 스펙 (순수 함수 — DB/브라우저 불필요)
        run: npx playwright test --project=products --reporter=line

      - name: 어드민 내비 SSOT 회귀 스펙 (순수 데이터/함수 — DB/브라우저 불필요)
        run: npx playwright test --project=admin --reporter=line

  # 마이그레이션 자동 적용 — 빌드가 통과한 실제 push(머지)에서만 실행한다.
  # PR 에는 돌지 않아(머지 전 DB 를 건드리지 않음), 깨진 코드가 DB 스키마를 바꾸지 못한다.
  # 러너(scripts/apply-migrations.mjs)는 public._migrations 로 적용 이력을 추적해 미적용만 돌리고,
  # 끝에 주요 테이블 존재를 검증한다. 어떤 IDE로 짰든 GitHub 에서 동일하게 적용·검증된다.
  migrate:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 환경 체계(2026-07-12): main push → prod DB, 그 외(integrate/**) push → staging DB.
      # Vercel 도 동일 매핑: main=Production(prod DB) / Preview=staging DB.
      - name: Apply migrations (미적용만) + 검증
        run: node scripts/apply-migrations.mjs
        env:
          SUPABASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_URL || secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # 결제 상태기계 DB 스펙(tests/payments/state-machine.db.spec.ts) — staging 전용, prod는 절대 사용하지 않는다.
  # 합성 __test_* 레코드로 0021/0024/0026 계약을 검증한다(브라우저 불필요, API 테스트). PR/push 모두 실행 —
  # staging에만 쓰기 때문에 머지 전에 돌려도 안전하고, 다음 리팩터(R2~R5)의 회귀 안전망이 된다.
  #
  # ★job-level concurrency를 여기서 뺐다(2026-07-13, 구조 변경으로 재정정) — visual.yml과 공용
  # concurrency 그룹을 공유시켰더니 GitHub이 그룹당 "실행 중 1개 + 대기 1개"만 유지하는 특성
  # 때문에 payments-routes(별도 워크플로였을 때)가 대기 중 새 이벤트에 밀려 통째로 cancelled
  # 되는 사고가 났다(실측: 여러 회 연속 취소돼 결제 라우트 프리뷰 스펙이 아예 안 돌고 있었음).
  # 근본 수정은 payments-routes를 visual.yml 안의 순차 잡(needs: visual)으로 합쳐 같은
  # 워크플로 실행 안에서 순서를 강제하는 것 — 그러면 이 잡(payments-db-spec, PR/push 트리거)이
  # 굳이 그 그룹에 낄 필요가 없다(애초에 이 잡은 API 테스트라 스크린샷을 안 찍으므로 시각
  # 회귀 오염과 무관 — /admin/products 오탐은 이 잡이 아니라 payments-routes가 만드는 합성
  # 상품이 원인이었고, 그건 이제 visual → payments-routes 순차 실행으로 막힌다).
  payments-db-spec:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: 결제 상태기계 DB 스펙 (staging)
        run: npx playwright test --project=payments tests/payments/state-machine.db.spec.ts --reporter=line
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_STAGING }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
