name: visual (골든플로우 시각 회귀)

# Vercel Preview 배포가 성공한 시점에 그 배포 URL을 대상으로 시각 회귀(14장)를 돌린다.
# 표현(마크업·스타일)이 병합에서 유실되면 픽셀 diff로 잡는 게이트 — AGENTS.md §8-1.
# 베이스라인 갱신은 update-baselines.yml(라벨 `update-baselines` 또는 수동 dispatch).
on:
  deployment_status:

# payments-routes.yml과 동일 그룹 키를 공유해 같은 프리뷰(=같은 staging DB)를 대상으로 하는 두
# 워크플로가 절대 동시에 돌지 않고 큐잉되어 순차 실행되게 한다. 이유: 결제 라우트 스펙
# (payment-routes.spec.ts)이 staging DB에 합성 상품(주문 생성을 위해 is_visible=true 필수 — 비노출
# 상품 주문은 정책상 차단, src/app/api/orders/route.ts)을 만드는데, 이게 같은 DB를 스크린샷하는
# 이 워크플로와 겹치면 그 합성 상품이 /shop 시각 회귀에 찍혀 오탐이 난다(실측: PR #32, /shop 데스크톱
# 4% diff).
# cancel-in-progress: false 필수 — 같은 그룹에서 true면 나중 워크플로가 상대를 취소해버려 required
# check(visual)가 영영 안 돌고 머지가 막힌다. 트레이드오프: 기존 cancel-in-progress: true가 노리던
# "동일 SHA 중복 deployment_status 이벤트 중복 실행 방지"는 약해진다(중복 이벤트가 취소 대신 큐잉돼
# 중복 실행된다). 대신 두 워크플로가 절대 겹치지 않는다 — 시각 회귀 오탐이 더 비싼 문제라 이 교환이 옳다.
concurrency:
  group: preview-db-${{ github.event.deployment.sha }}
  cancel-in-progress: false

jobs:
  visual:
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Visual regression (vs baseline)
        run: npx playwright test tests/golden/visual.spec.ts --reporter=line
        env:
          E2E_BASE_URL: ${{ github.event.deployment_status.environment_url }}
          # Deployment Protection 재활성화 대비(§8-6) — secret 미등록이면 빈 값으로 무시됨
          VERCEL_AUTOMATION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS }}
          # 공개 리포 — admin 자격증명은 secret으로만 주입(미등록 시 admin 촬영 skip)
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 7
